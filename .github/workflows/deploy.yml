name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-maazportfolio
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SEO pages (projects, services, about, sitemap)
        run: node build/generate.mjs

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -az --delete \
            --exclude='.git/' --exclude='.github/' --exclude='.claude/' --exclude='.DS_Store' \
            --exclude='build/' --exclude='data/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/www/wwwroot/maazzindani.com/

      - name: Fix permissions and reload nginx
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            flock /tmp/taxidex-deploy.lock -c "
              chown -R www:www /www/wwwroot/maazzindani.com &&
              find /www/wwwroot/maazzindani.com -type d -exec chmod 755 {} \; &&
              find /www/wwwroot/maazzindani.com -type f -exec chmod 644 {} \; &&
              nginx -t && /etc/init.d/nginx reload
            "
          '
